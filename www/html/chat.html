<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Direct Chat</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-bg: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --sidebar-width: 300px;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--primary-bg);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar / User List */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.25rem;
            font-weight: 700;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.02);
        }

        .user-list {
            list-style: none;
            padding: 10px 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        .user-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .user-item.active {
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent-color);
        }

        .user-item.active::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent-color);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            margin-left: auto;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        }

        /* Main Chat Area */
        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            position: relative;
        }

        .chat-header {
            padding: 15px 25px;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            z-index: 10;
        }

        #target-user-name {
            font-weight: 600;
            color: var(--accent-color);
        }

        .messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .message-bubble {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-bubble.received {
            background: var(--glass-bg);
            align-self: flex-start;
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .message-bubble.sent {
            background: var(--accent-color);
            color: #0f172a;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
        }

        .message-info {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-bottom: 4px;
            display: block;
        }

        .sent .message-info {
            text-align: right;
            color: rgba(15, 23, 42, 0.7);
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .input-wrapper {
            flex-grow: 1;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px;
            color: white;
            outline: none;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            background: rgba(0, 0, 0, 0.4);
        }

        button {
            background: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 0 25px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 35%;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
            }
            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">在線人員 <span style="font-size: 0.8rem; font-weight: normal; opacity: 0.6;">(每5秒更新)</span></div>
        <ul class="user-list" hx-get="/online" hx-trigger="load, every 5s" hx-swap="innerHTML">
            <!-- HTMX will poll online users here -->
            <li class="user-item" style="opacity: 0.5;">載入中...</li>
        </ul>
    </div>
    <div class="chat-container">
        <div class="chat-header">
            <span id="target-user-name">請選擇聊天對象</span>
        </div>
        <div class="messages" id="message-list">
            <div class="message-bubble received" style="align-self: center; border-radius: 12px; border-bottom-left-radius: 12px; font-style: italic;">
                從左側列表中選擇一位好友開始對話
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="chat-input" placeholder="在這裡輸入訊息..." onkeydown="if(event.key==='Enter') sendMessage()">
            </div>
            <button onclick="sendMessage()">發送</button>
        </div>
    </div>

    <script>
        let selectedUser = "";
        let ws;
        // Generate a random ID for this session if not set
        let myUserID = localStorage.getItem('jarvis_user_id');
        if (!myUserID) {
            myUserID = 'User_' + Math.random().toString(36).substr(2, 5);
        }
        const myName = localStorage.getItem('jarvis_user_name') || myUserID;

        function selectUser(userID) {
            if (userID === myUserID) return; // Don't chat with self
            selectedUser = userID;
            document.getElementById('target-user-name').innerText = "正在與 " + userID + " 對話";
            
            // Highlight selected user in list
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
            // Find the element that was clicked or matching userID
            const items = document.querySelectorAll('.user-item');
            items.forEach(item => {
                if (item.innerText.includes(userID)) {
                    item.classList.add('active');
                }
            });
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/webhook?user=${myUserID}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log("WebSocket connected as " + myUserID);
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    // Check if message is for me or a broadcast
                    if (data.reply_to === myUserID || (data.channel === "pcai" && !data.reply_to)) {
                        // If it's a DM from someone not selected, maybe show a hint
                        addMessage(data.display_name || data.user_id, data.message, 'received');
                    }
                } catch (e) {
                    console.error("Failed to parse message", e);
                }
            };

            ws.onclose = () => {
                console.log("WebSocket disconnected. Reconnecting...");
                setTimeout(connect, 2000);
            };
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (!message) return;

            if (selectedUser) {
                const payload = {
                    channel: "pcai",
                    message: message,
                    user_id: myUserID,
                    display_name: myName,
                    reply_to: selectedUser,
                    type: "command",
                    timestamp: new Date().toISOString()
                };
                ws.send(JSON.stringify(payload));
                addMessage("我", message, 'sent');
                input.value = "";
            } else {
                alert("請從左側列表選擇一個在線人員！");
            }
        }

        function addMessage(sender, text, type) {
            const list = document.getElementById('message-list');
            const div = document.createElement('div');
            div.className = `message-bubble ${type}`;
            
            const info = document.createElement('span');
            info.className = 'message-info';
            info.innerText = sender + " • " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            const content = document.createElement('div');
            // Check if text is a string before parsing
            content.innerHTML = typeof text === 'string' ? marked.parse(text) : text;
            
            div.appendChild(info);
            div.appendChild(content);
            list.appendChild(div);
            
            // Auto scroll to bottom
            list.scrollTop = list.scrollHeight;
        }

        // Initialize
        connect();
        
        // Ensure HTMX works with our selectUser function
        // We'll use a mutation observer or just rely on the onclick in the HTMX snippet
    </script>
</body>
</html>
