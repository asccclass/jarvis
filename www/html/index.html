<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Jarvis">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <script src="/js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <title>J.I.I. PWA Console</title>
    <style>
        :root {
            --jarvis-blue: #00d2ff;
            --jarvis-online: #39ff14;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000b1a;
            /* 建議替換為您提供的背景圖 */
            background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 20, 0.6);
            z-index: -1;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 2px;
            box-sizing: border-box;
        }

        /* 頂部虛擬人物頭像 */
        .avatar-wrapper {
            width: 110px;
            height: 110px;
            margin: 25px auto 5px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--jarvis-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        .avatar-wrapper img,
        .avatar-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 全螢幕閒置播放模式 */
        .avatar-wrapper.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            margin: 0;
            border-radius: 0;
            border: none;
            box-shadow: none;
            z-index: 9000;
            background: #000;
        }

        /* 頂部對話流 - 參考圖片的卡片堆疊感 */
        .output-panel {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 160px;
            /* 預留給底欄空間 */
        }

        .msg-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1.5px solid var(--glass-border);
            border-radius: 18px;
            padding: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            color: white;
            line-height: 1.5;
            width: fit-content;
            max-width: 85%;
            word-break: break-word;
        }

        .msg-card.user {
            align-self: flex-end;
            border-right: 4px solid var(--jarvis-online);
            border-left: none !important;
            border-bottom-right-radius: 4px;
            background: rgba(57, 255, 20, 0.05);
        }

        .msg-card.system {
            align-self: flex-start;
            border-left: 4px solid var(--jarvis-blue);
            border-bottom-left-radius: 4px;
        }

        /* 訊息消失動畫 */
        .fade-out {
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s ease;
        }

        /* 輸入預覽區 (導航列上方) */
        .preview-box {
            position: fixed;
            bottom: 85px;
            left: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            padding: 12px;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
            z-index: 101;
        }

        #editable-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-size: 1rem;
        }

        .action-btn {
            border: none;
            border-radius: 10px;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        #send-btn {
            background: var(--jarvis-blue);
            color: black;
        }

        #cancel-btn {
            background: rgba(255, 75, 75, 0.2);
            color: #ff4b4b;
            border: 1px solid #ff4b4b;
        }

        /* 底部導航列 */
        .nav-bar {
            position: fixed;
            bottom: 5px;
            left: 5px;
            right: 5px;
            height: 75px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
        }

        #record-btn {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 10px;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 3px solid var(--jarvis-blue);
            background: #000b1a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            transition: all 0.3s;
            z-index: 105;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        #record-btn.online {
            border-color: var(--jarvis-online);
            box-shadow: 0 0 20px var(--jarvis-online);
        }

        #record-btn.active {
            transform: translateX(-50%) scale(0.9);
            background: rgba(0, 210, 255, 0.3);
        }

        /* 圖片訊息卡片樣式 */
        .msg-image {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            border: 1px solid var(--glass-border);
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- 頂部虛擬人物 (圖片或影片串流) -->
        <div class="avatar-wrapper" id="jii-avatar-wrapper">
            <img id="jii-avatar-img" src="/images/jii.png" alt="Jii 哥" style="display: none;">
            <!-- 自動播放、靜音是影片作為背景頭像的標準配置 -->
            <video id="jii-avatar-video" autoplay muted playsinline style="display: none;"></video>
        </div>

        <div class="output-panel" id="chat-flow">
            <div class="msg-card system" style="border-left: 4px solid var(--jarvis-blue);">
                System: J.I.I. 系統已就緒，請按下左下方按鈕開始語音，或直接點擊輸入。
            </div>
        </div>

        <div class="preview-box" id="preview-box">
            <input type="text" id="editable-input" placeholder="說點什麼或在此手寫輸入...">
            <button id="cancel-btn" class="action-btn" title="取消">❌</button>
            <button id="send-btn" class="action-btn" title="發送"
                style="display: flex; align-items: center; justify-content: center;">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
            </button>
        </div>

        <div class="nav-bar">
            <!-- 左側圖示 -->
            <div style="display: flex; gap: 20px; align-items: center;">
                <label for="file-input" style="cursor: pointer; font-size: 26px;">📷</label>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
                <div id="clear-btn" style="font-size: 26px; cursor: pointer;" title="清除對話">🧹</div>
            </div>

            <!-- 中心大按鈕 -->
            <div id="record-btn">🎙️</div>

            <!-- 右側資訊與圖示 -->
            <div style="display: flex; gap: 15px; align-items: center;">
                <div style="color: white; font-size: 0.9rem; text-align: right;" id="status-label">Jii Online</div>
                <div id="settings-btn" style="font-size: 26px; opacity: 0.6; cursor: pointer;" title="設定名稱">⚙️</div>
            </div>
        </div>
    </div>

    <!-- 姓名輸入對話框 (PWA 專用) -->
    <div id="name-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 11, 26, 0.9); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">
        <div
            style="background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 320px; box-shadow: 0 10px 40px rgba(0, 210, 255, 0.3);">
            <div
                style="width: 80px; height: 80px; margin: 0 auto 15px auto; border-radius: 50%; border: 2px solid var(--jarvis-blue); overflow: hidden;">
                <img src="/images/jii.png" style="width: 100%; height: 100%; object-fit: cover;" alt="Jii">
            </div>
            <h2 style="color: white; margin: 0 0 10px 0; font-size: 1.5rem;">J.I.I. 系統登入</h2>
            <p style="color: #aaa; margin: 0 0 20px 0; font-size: 0.9rem;">請輸入您的稱呼以開始對話</p>
            <input type="text" id="overlay-name-input" placeholder="例如：Jii 哥"
                style="width: 100%; padding: 15px; box-sizing: border-box; border-radius: 12px; border: 1px solid rgba(0, 210, 255, 0.5); background: rgba(0, 0, 0, 0.6); color: white; margin-bottom: 20px; font-size: 1rem; text-align: center; outline: none;">
            <button id="overlay-submit-btn"
                style="background: var(--jarvis-blue); color: #000b1a; border: none; padding: 15px; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);">進入系統</button>
        </div>
    </div>

    <script>
        // --- 取得或設定使用者名稱 ---
        let myName = localStorage.getItem('jarvis_user_name');
        const socketUrl = 'wss://jarvis.justdrink.com.tw/webhook';
        const fileInput = document.getElementById('file-input');
        const btn = document.getElementById('record-btn');
        const previewBox = document.getElementById('preview-box');
        const inputField = document.getElementById('editable-input');
        const chatFlow = document.getElementById('chat-flow');
        const statusLabel = document.getElementById('status-label');
        let socket;

        // --- 虛擬人物頭像顯示邏輯 ---
        const avatarImg = document.getElementById('jii-avatar-img');
        const avatarVideo = document.getElementById('jii-avatar-video');

        /**
         * 切換虛擬人物顯示方式
         * @param {string|MediaStream} source - 圖片路徑、影片 URL 或 MediaStream 物件
         * @param {string} type - 'image' 或 'video' / 'stream'
         */
        function setAvatarDisplay(source, type = 'image') {
            if (type === 'video' || type === 'stream') {
                avatarImg.style.display = 'none';
                avatarVideo.style.display = 'block';
                if (source instanceof MediaStream) {
                    avatarVideo.srcObject = source;
                    avatarVideo.removeAttribute('src');
                } else {
                    avatarVideo.srcObject = null;
                    avatarVideo.src = source;
                }
            } else {
                avatarVideo.style.display = 'none';
                avatarImg.style.display = 'block';
                // 清除 video 資源
                avatarVideo.srcObject = null;
                avatarVideo.removeAttribute('src');
                avatarImg.src = source;
            }
        }

        // 預設載入靜態圖片
        setAvatarDisplay('/images/jii.png', 'image');

        // ========================================
        // === 閒置偵測 + 樹狀影片播放系統 ===
        // ========================================

        const avatarWrapper = document.getElementById('jii-avatar-wrapper');

        // --- 樹狀播放清單設定 ---
        // 每個節點: { video: '影片路徑', image: '結束靜態圖', children: [子節點...] }
        // children 為空陣列 = 葉節點 → 播完自動 loop 回根節點

        // 上午 (06:00 ~ 11:59)
        const morningTree = {
            video: '/actions/readbooks.mp4',
            image: '/images/readbooks.png',
            children: [
                // 新增子節點範例：
                // { video: '/actions/morning_stretch.mp4', image: '/images/jii.png', children: [] }
            ]
        };

        // 下午 (12:00 ~ 17:59)
        const afternoonTree = {
            video: '/actions/readbooks.mp4',
            image: '/images/readbooks.png',
            children: [
                // 新增子節點範例：
                // { video: '/actions/afternoon_walk.mp4', image: '/images/jii.png', children: [] }
            ]
        };

        // 晚上 (18:00 ~ 05:59)
        const eveningTree = {
            video: '/actions/readbooks.mp4',
            image: '/images/readbooks.png',
            children: [
                // 新增子節點範例：
                // { video: '/actions/evening_relax.mp4', image: '/images/jii.png', children: [] }
            ]
        };

        // --- 閒置逾時設定（毫秒）---
        const IDLE_TIMEOUT = 3 * 60 * 1000; // 3 分鐘

        let idleTimer = null;
        let isIdleMode = false;
        let currentTreeRoot = null;   // 目前時段的播放樹根節點
        let currentNode = null;       // 目前正在播放的節點

        /**
         * 依目前時段取得對應播放樹
         */
        function getTreeByTimePeriod() {
            const hour = new Date().getHours();
            if (hour >= 6 && hour < 12) {
                return morningTree;
            } else if (hour >= 12 && hour < 18) {
                return afternoonTree;
            } else {
                return eveningTree;
            }
        }

        /**
         * 播放指定節點的影片
         */
        function playNode(node) {
            currentNode = node;
            setAvatarDisplay(node.video, 'video');
            console.log(`🎬 播放節點：${node.video}`);
        }

        /**
         * 進入閒置模式：zoom-out 頭像至全螢幕，從根節點開始播放
         */
        function enterIdleMode() {
            if (isIdleMode) return;
            currentTreeRoot = getTreeByTimePeriod();
            if (!currentTreeRoot || !currentTreeRoot.video) return;

            isIdleMode = true;

            // 從根節點開始播放
            playNode(currentTreeRoot);
            avatarWrapper.classList.add('fullscreen');
            console.log('🎬 進入閒置模式（樹狀播放）');
        }

        /**
         * 離開閒置模式：切回靜態圖片並 zoom-in 回小頭像
         */
        function exitIdleMode() {
            if (!isIdleMode) return;
            isIdleMode = false;

            // 取得目前節點對應的靜態圖片（預設 jii.png）
            const staticImage = (currentNode && currentNode.image)
                ? currentNode.image
                : '/images/jii.png';

            setAvatarDisplay(staticImage, 'image');
            avatarWrapper.classList.remove('fullscreen');
            currentNode = null;
            currentTreeRoot = null;
            console.log('🏠 離開閒置模式');
            resetIdleTimer();
        }

        /**
         * 影片播完後前進到下一個節點
         * - 有子節點 → 隨機挑一個子節點播放
         * - 無子節點（葉節點）→ loop 回根節點重新開始
         */
        function advanceToNextNode() {
            if (!currentNode || !isIdleMode) return;

            if (currentNode.children && currentNode.children.length > 0) {
                // 隨機挑選一個子節點
                const nextNode = currentNode.children[
                    Math.floor(Math.random() * currentNode.children.length)
                ];
                playNode(nextNode);
            } else {
                // 葉節點 → loop 回根節點
                console.log('🔄 葉節點播完，loop 回根節點');
                playNode(currentTreeRoot);
            }
        }

        /**
         * 重設閒置計時器
         */
        function resetIdleTimer() {
            if (idleTimer) clearTimeout(idleTimer);

            // 若正在全螢幕播放中，使用者互動 → 離開閒置模式
            if (isIdleMode) {
                exitIdleMode();
                return;
            }

            idleTimer = setTimeout(() => {
                enterIdleMode();
            }, IDLE_TIMEOUT);
        }

        // --- 監聽使用者活動事件以重設閒置計時器 ---
        ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll', 'click'].forEach(evt => {
            document.addEventListener(evt, resetIdleTimer, { passive: true });
        });

        // 監聽影片播放結束事件
        avatarVideo.addEventListener('ended', () => {
            if (isIdleMode) {
                // 樹狀播放：前進到下一個節點
                advanceToNextNode();
            } else {
                // 非閒置模式下的影片結束，恢復預設圖片
                setAvatarDisplay('/images/jii.png', 'image');
            }
        });

        // 啟動閒置計時器
        resetIdleTimer();

        async function subscribeToPush() {
            const registration = await navigator.serviceWorker.ready;
            const subscription = await registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: VAPID_PUBLIC_KEY
            });
            // 將此訂閱資訊發送給 Go 後端儲存至資料庫
            await fetch('/subscribe', {
                method: 'POST',
                body: JSON.stringify(subscription),
                headers: { 'Content-Type': 'application/json' }
            });
            console.log('✅ PCAI 推送通知訂閱成功');
        }

        // --- 訊息 UI 處理 ---
        function addMessageToUI(sender, text) {
            const card = document.createElement('div');
            card.className = 'msg-card';

            if (sender == 'SYSTEM') {
                card.classList.add('system');
                card.style.borderLeft = '4px solid var(--jarvis-blue)';
                const formattedMsg = marked.parse(text.message);
                card.innerHTML = `<div style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 5px;">[${text.user_id}]</div>${formattedMsg}`;
            } else {
                card.classList.add('user');
                card.style.borderRight = '4px solid var(--jarvis-online)';
                card.innerHTML = `<div style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 5px; text-align: right;">[${myName}]</div><div>${text.replace(/\n/g, '<br>')}</div>`;
            }
            chatFlow.appendChild(card);
            chatFlow.scrollTop = chatFlow.scrollHeight;
        }

        // --- WebSocket 與 PWA 基礎邏輯 ---
        function connectWS() {
            const connectUrl = socketUrl + "?user=" + encodeURIComponent(myName);
            socket = new WebSocket(connectUrl);
            socket.onopen = () => {
                btn.classList.add('online');
                statusLabel.innerText = "Jii Online";
            };
            socket.onclose = () => {
                btn.classList.remove('online');
                statusLabel.innerText = "Reconnecting...";
                setTimeout(connectWS, 2000);
            };
            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.channel === "pcai" && data.type === "response") {
                        let innerMsg = null;
                        let replyTarget = data.reply_to;

                        try {
                            // 嘗試解析內部 message 如果它是 JSON 字串
                            innerMsg = JSON.parse(data.message);
                            if (!replyTarget && innerMsg && innerMsg.reply_to) {
                                replyTarget = innerMsg.reply_to;
                            }
                        } catch (e) {
                            // 若不是 JSON，則保留原始 data.message 字串
                        }

                        // 收到的 response 訊息中的 reply_to 與 myName 一樣時才顯示，否則忽略廣播訊息
                        if (replyTarget === myName) {
                            let displayObj = {
                                message: (innerMsg && innerMsg.message) ? innerMsg.message : data.message,
                                user_id: (innerMsg && innerMsg.user_id) ? innerMsg.user_id : (data.user_id || 'System')
                            };
                            addMessageToUI('SYSTEM', displayObj);
                        }
                    }
                } catch (err) {
                    console.error('Socket message processing error:', err);
                }
            };
        }

        fileInput.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (event) {
                const base64Data = event.target.result;
                // 1. 在 UI 顯示已上傳圖片
                addMessageToUI('USER', `<img src="${base64Data}" class="msg-image"><br>分析這張圖片...`);
                // 2. 封裝成 JSON 發送
                if (socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({
                        type: "image_analysis",
                        data: base64Data, // 包含 data:image/png;base64,...
                        channel: "pcai",
                        user_id: myName // 使用您的識別碼
                    }));
                }
            };
            reader.readAsDataURL(file);
        });

        // --- 語音辨識邏輯 ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-TW';
            recognition.interimResults = true;

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                btn.classList.add('active');
                previewBox.style.display = 'flex';
                inputField.value = '正在聆聽...';
                recognition.start();
            });

            btn.addEventListener('touchend', () => {
                btn.classList.remove('active');
                recognition.stop();
            });

            recognition.onresult = (event) => {
                let transcript = Array.from(event.results).map(r => r[0].transcript).join('');
                inputField.value = transcript;
            };
        }

        // --- 按鍵行為邏輯 ---
        // 1. 快速取消
        document.getElementById('cancel-btn').addEventListener('click', () => {
            previewBox.style.display = 'none';
            inputField.value = '';
        });

        // 封裝後的統一發送函式
        function sendMessageToPCAI(content, type = "command") {
            if (socket && socket.readyState === WebSocket.OPEN) {
                const payload = {
                    channel: "pcai",      // 指定頻道
                    type: type,           // 標記為指令或回應
                    message: content,     // 實際的文字內容
                    user_id: myName,      // 使用者識別
                    timestamp: new Date().toISOString()
                };
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify(payload));
                    // 如果是使用者發出的，則在 UI 顯示
                    if (type === "command") {
                        addMessageToUI('USER', content);
                    }
                } else {
                    // 斷線時，儲存到離線佇列
                    OfflineManager.save(payload);
                    addMessageToUI('SYSTEM', `[離線暫存] ${content}`);
                }
            }
        }

        // 2. 發送訊息 (並解決循環問題)
        document.getElementById('send-btn').addEventListener('click', () => {
            const text = inputField.value;
            if (text && socket.readyState === WebSocket.OPEN) {
                sendMessageToPCAI(text); // 使用封裝函式
                previewBox.style.display = 'none';
                inputField.value = '';
            }
        });

        // --- 螢幕喚醒鎖 (保持螢幕常亮) ---
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock 已釋放');
                    });
                    console.log('Wake Lock 已啟用，螢幕將保持常亮');
                }
            } catch (err) {
                console.warn(`Wake Lock 錯誤: ${err.name}, ${err.message}`);
            }
        }

        // 當頁面切換回前景時，重新請求 Wake Lock
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        // 3. 手寫/鍵盤輸入支援
        // 即使不錄音，直接點擊按鍵列上方也能觸發輸入 (若需要可增加專屬按鈕)
        function initApp() {
            connectWS();
            requestWakeLock();
        }

        // 顯示姓名輸入彈跳視窗
        if (!myName) {
            const nameOverlay = document.getElementById('name-overlay');
            const overlayNameInput = document.getElementById('overlay-name-input');
            const overlaySubmitBtn = document.getElementById('overlay-submit-btn');

            nameOverlay.style.display = 'flex';

            overlaySubmitBtn.addEventListener('click', () => {
                const val = overlayNameInput.value.trim();
                if (val) {
                    myName = val;
                    localStorage.setItem('jarvis_user_name', myName);
                    nameOverlay.style.display = 'none';
                    initApp(); // 開始連線
                } else {
                    alert('請輸入有效的姓名！');
                }
            });

            overlayNameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    overlaySubmitBtn.click();
                }
            });
        } else {
            initApp();
        }
        // --- 監聽網路恢復狀態 ---
        window.addEventListener('online', () => {
            console.log('🌐 網路已恢復，準備補發訊息...');
            if (socket && socket.readyState === WebSocket.OPEN) {
                OfflineManager.processQueue(socket);
            }
        });

        // 綁定清除按鈕事件
        document.getElementById('clear-btn').addEventListener('click', async () => {
            if (confirm("確定要清除所有對話紀錄與暫存嗎？")) {
                // 1. 畫面清空動畫
                const cards = document.querySelectorAll('.msg-card');
                cards.forEach(card => card.classList.add('fade-out'));

                setTimeout(() => {
                    chatFlow.innerHTML = `
                <div class="msg-card system" style="border-left: 4px solid var(--jarvis-blue);">
                    System: 紀錄已清除。J.I.I. 重新待命。
                </div>`;
                }, 500);

                // 2. 清除離線暫存佇列 (IndexedDB)
                await OfflineManager.clearQueue();

                // 3. 通知後端清除 Session (透過封裝好的 WebSocket 訊息)
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({
                        channel: "pcai",
                        type: "command",
                        message: "/clear_session", // 自定義清除指令
                        user_id: myName
                    }));
                }
            }
        });

        // 綁定設定(齒輪)按鈕事件：修改使用者姓名
        document.getElementById('settings-btn').addEventListener('click', () => {
            const newName = prompt("請輸入您的新姓名：", myName);
            if (newName && newName.trim() !== "") {
                const oldName = myName;
                myName = newName.trim();
                localStorage.setItem('jarvis_user_name', myName);

                // 在畫面上提示修改成功
                addMessageToUI('SYSTEM', `[系統提示] 您已將姓名從「${oldName}」修改為「${myName}」。之後的對話將使用新姓名。`);

                // 若已連線，可以重新連線以更新 socket 上的 user 參數，或直接通知後端
                if (socket && socket.readyState === WebSocket.OPEN) {
                    // 根據目前架構，可以直接關閉再重連讓 URL query 帶入新名字
                    socket.close();
                }
            }
        });

        // 擴充 OfflineManager 以支援清除功能
        OfflineManager.clearQueue = async function () {
            const db = await this.init();
            const tx = db.transaction(this.storeName, 'readwrite');
            tx.objectStore(this.storeName).clear();
            console.log('🧹 離線資料庫已清空');
        };
    </script>
</body>

</html>
